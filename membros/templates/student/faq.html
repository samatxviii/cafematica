{% extends "base.html" %}
{% block content %}
<h1 class="h3">Perguntas frequentes</h1>
<div class="accordion mb-4" id="faq">
  {% for f in faqs %}
  <div class="accordion-item">
    <h2 class="accordion-header">
      <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#faq{{ f.id }}">{{ f.question }}</button>
    </h2>
    <div id="faq{{ f.id }}" class="accordion-collapse collapse" data-bs-parent="#faq">
      <div class="accordion-body">{{ f.answer }}</div>
    </div>
  </div>
  {% endfor %}
</div>
<a class="btn btn-success" href="{{ url_for('tickets') }}">Minha dúvida não está aqui: abrir ticket</a>
{% endblock %}
