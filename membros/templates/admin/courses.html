{% extends "admin/layout.html" %}
{% block admin_content %}
<div class="d-flex justify-content-between mb-3">
<h1 class="h3">Cursos</h1><a class="btn btn-success" href="{{ url_for('admin_course_new') }}">Novo curso</a>
</div>
<div class="row g-3">
{% for c in courses %}
  <div class="col-md-6"><div class="card h-100">
    {% if c.thumbnail_url %}<img src="{{ c.thumbnail_url }}" class="card-img-top">{% endif %}
    <div class="card-body">
      <span class="badge text-bg-secondary">{{ c.category_name or "Sem categoria" }}</span>
      <h2 class="h5 mt-2">{{ c.title }}</h2>
      <a class="btn btn-sm btn-outline-success" href="{{ url_for('admin_course_edit', course_id=c.id) }}">Editar</a>
    </div>
  </div></div>
{% endfor %}
</div>
{% endblock %}
