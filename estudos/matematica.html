<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Estudos de Matemática | Cafemática</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Estilo bonito parecido com visual de Markdown do GitHub -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">

  <style>
    body {
      margin: 0;
      background: #f6f8fa;
      font-family: Arial, sans-serif;
    }

    .pagina {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .markdown-body {
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    @media (max-width: 700px) {
      .pagina {
        margin: 0;
        padding: 0;
      }

      .markdown-body {
        border-radius: 0;
        padding: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="pagina">
    <article id="conteudo" class="markdown-body">
      Carregando...
    </article>
  </div>

  <!-- Biblioteca que converte Markdown para HTML -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    fetch('matematica.md')
      .then(resposta => {
        if (!resposta.ok) {
          throw new Error('Arquivo Markdown não encontrado.');
        }
        return resposta.text();
      })
      .then(markdown => {
        document.getElementById('conteudo').innerHTML = marked.parse(markdown);
      })
      .catch(erro => {
        document.getElementById('conteudo').innerHTML = `
          <h1>Erro ao carregar o conteúdo</h1>
          <p>Não consegui encontrar o arquivo <code>matematica.md</code>.</p>
        `;
        console.error(erro);
      });
  </script>

</body>
</html>
